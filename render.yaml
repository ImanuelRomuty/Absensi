# Render Blueprint — set DATABASE_URL (Neon) and WEB_ORIGIN (Vercel URL) in the dashboard.
# Repo root file; service uses rootDir BE.

services:
  - type: web
    name: masarif-be
    runtime: node
    plan: free
    rootDir: BE
    buildCommand: npm install -g pnpm@9.15.0 && pnpm install --frozen-lockfile --prod=false && pnpm build
    startCommand: pnpm start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: WEB_ORIGIN
        sync: false
