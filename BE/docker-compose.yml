services:
  postgres:
    image: postgres:16-alpine
    container_name: masarif-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: masarif
      POSTGRES_PASSWORD: masarif
      POSTGRES_DB: masarif
    volumes:
      - masarif_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masarif -d masarif"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  masarif_pg_data:
